services:
  dashboard:
    build: .
    container_name: household-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: "${APP_NAME:-Household Dashboard}"
      DATABASE_PATH: "${DATABASE_PATH:-/data/dashboard.sqlite3}"
      PHOTO_DIR: "${PHOTO_DIR:-/photos}"
      PHOTO_MAX_IMAGES: "${PHOTO_MAX_IMAGES:-500}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-this-password}"
      SESSION_SECRET: "${SESSION_SECRET:-replace-with-a-long-random-secret}"
      DISPLAY_PUBLIC: "${DISPLAY_PUBLIC:-true}"
      CALENDAR_REFRESH_SECONDS: "${CALENDAR_REFRESH_SECONDS:-900}"
      WEATHER_REFRESH_SECONDS: "${WEATHER_REFRESH_SECONDS:-900}"
      FRIGATE_TIMEOUT_SECONDS: "${FRIGATE_TIMEOUT_SECONDS:-8}"
    volumes:
      - ./data:/data
      - /mnt/Eddy/photo:/photos:ro
